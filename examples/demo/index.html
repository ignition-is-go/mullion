<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mullion Demo</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        :root { interpolate-size: allow-keywords; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #0e0e0e; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .activity-content { padding: 16px; height: 100%; overflow: auto; }
        .activity-content h2 { margin-bottom: 12px; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #bbb; }
        .activity-content p { opacity: 0.85; font-size: 13px; line-height: 1.6; }
        .file-item { padding: 4px 8px; cursor: pointer; font-size: 13px; border-radius: 3px; color: #ddd; }
        .file-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    </style>
</head>
