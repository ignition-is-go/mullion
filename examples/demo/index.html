    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mullion Demo</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
        :root { interpolate-size: allow-keywords; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; }
        .activity-content { padding: 16px; height: 100%; overflow: auto; }
        .activity-content h2 { margin-bottom: 12px; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .activity-content p { opacity: 0.7; font-size: 13px; line-height: 1.6; }
        .file-item { padding: 4px 8px; cursor: pointer; font-size: 13px; border-radius: 3px; }
        .file-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
